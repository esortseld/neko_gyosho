<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>行政書士試験 過去問解説</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <p class="site-label">行政書士試験 過去問解説</p>
      <h1>行政書士試験 過去問解説</h1>
      <p class="site-subtitle">問題文を載せずに、肢ごとの知識を整理するページ</p>
    </div>
  </header>

  <main>
    <section class="page-card" aria-labelledby="top-title">
      <h2 id="top-title">年度別・科目別に学ぶ過去問ノート</h2>
      <p>
        行政書士試験の過去問を、年度別・科目別・問題別に整理します。
        問題文や正解番号は掲載せず、各肢で問われた知識を学習用に再構成します。
      </p>
    </section>

    <section class="page-card" aria-labelledby="year-list">
      <h2 id="year-list">年度別過去問一覧</h2>
      <div class="card-grid">
        <a class="link-card" href="2024/index.html">
          <span class="card-kicker">年度別ページ</span>
          <strong>2024年度過去問</strong>
          <span>科目別の一覧へ進む</span>
        </a>
      </div>
    </section>

    <section class="page-card" aria-labelledby="subjects">
      <h2 id="subjects">科目分類</h2>
      <p>各年度の問題を、次の科目に分けて整理します。</p>
      <div class="card-grid compact-grid">
        <div class="plain-card">行政法</div>
        <div class="plain-card">民法</div>
        <div class="plain-card">憲法</div>
        <div class="plain-card">会社法</div>
        <div class="plain-card">商法</div>
        <div class="plain-card">一般知識</div>
      </div>
    </section>
  </main>
</body>
</html>
